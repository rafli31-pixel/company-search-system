<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Company Search</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <h1>Company Search</h1>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari perusahaan / produk / nib">

            <button id="searchButton">
                Search
            </button>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Perusahaan</th>

                    <th>Produk</th>


                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <!-- MODAL DETAIL -->

    <div id="detailModal"
         class="modal">

        <div class="modal-content">

            <span class="close"
                  onclick="closeModal()">

                &times;

            </span>

            <div id="detailContent">

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
